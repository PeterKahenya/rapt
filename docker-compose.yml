services:

  mysql_db:
    image: mysql
    env_file:
      - .env
    expose:
      - ${MYSQL_PORT}
    ports:
      - 3307:${MYSQL_PORT}
    volumes:
      - rapt_mysql_db_data:/var/local/mysql
      - rapt_mysql_db_config:/etc/mysql

  raptservice:
    container_name: ${SERVICE_NAME}
    depends_on:
      - mysql_db
    restart: always
    build: 
      context: ./rapt_service
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - ${SERVICE_PORT}
    ports:
      - "5001:${SERVICE_PORT}"
    command: sh -c "chmod +x /rapt_service/entrypoint.sh && sh /rapt_service/entrypoint.sh"
    volumes:
      - ./rapt_service/:/rapt_service/
  
  server:
    container_name: nginxserver
    depends_on:
      - raptservice
    restart: always
    build: 
      context: ./nginx
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "80:80"
    command: sh -c "chmod +x /app/entrypoint.sh && sh /app/entrypoint.sh"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:rw
      - ./nginx/static/:/var/www/static/:ro

volumes:
  rapt_mysql_db_data:
  rapt_mysql_db_config:

